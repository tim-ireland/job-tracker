name: CI/CD

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest black flake8
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting with black
      run: |
        black --check .
    
    - name: Run tests
      run: |
        pytest
      env:
        DATA_DIR: ./test_data
  
  build:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build Docker image
      run: |
        docker build -t job-search-toolkit:test .
    
    - name: Test Docker image
      run: |
        docker run --rm -d -p 8000:8000 -e DATA_DIR=/tmp/test job-search-toolkit:test
        sleep 10
        curl -f http://localhost:8000 || exit 1
    
    - name: Log in to Docker Hub (if on main branch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: docker/login-action@v2
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push to Docker Hub (if on main branch)
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      run: |
        docker tag job-search-toolkit:test ${{ secrets.DOCKER_USERNAME }}/job-search-toolkit:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/job-search-toolkit:latest
