version: '3.8'

services:
  job-tracker:
    build: .
    container_name: job-search-tracker
    ports:
      - "${HOST_PORT:-8000}:8000"
      - "${MCP_PORT:-3000}:3000"
    volumes:
      # Mount your personal data directory
      - ${DATA_PATH:-../my-job-search-2026}:/data
    environment:
      - DATA_DIR=/data
      - PYTHONUNBUFFERED=1
      - DATABASE_URL=sqlite:////data/job_applications.db
    restart: unless-stopped
    stdin_open: true
    tty: true
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

